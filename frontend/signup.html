<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
  <h2>Sign Up</h2>

  <input type="text" id="signup-username" placeholder="Username">

  <p id="message"></p>

</div>

<script src="script.js"></script>
</body>
</html>
